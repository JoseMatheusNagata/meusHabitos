<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Hábitos - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-card">
    <h1>Meus Hábitos</h1>
    <p id="subtitulo">Faça login para acessar seu diário.</p>

    <form id="formLogin">
        <div class="form-group">
            <label for="emailLogin">E-mail</label>
            <input type="email" id="emailLogin" placeholder="O seu e-mail" required>
        </div>

        <div class="form-group">
            <label for="senhaLogin">Senha</label>
            <input type="password" id="senhaLogin" placeholder="A sua senha" required>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
        <p class="toggle-text">Não tem conta? <a href="#" id="linkRegisto">Registe-se aqui</a></p>
    </form>

    <form id="formRegisto" style="display: none;">
        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Como quer ser chamado?" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="O seu melhor e-mail" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha segura" required>
        </div>

        <button type="submit" class="btn-submit">Criar Conta</button>
        <p class="toggle-text">Já tem conta? <a href="#" id="linkLogin">Faça login aqui</a></p>
    </form>

    <div id="mensagem"></div>
</div>

<script src="js/login.js"></script>
</body>
</html>
