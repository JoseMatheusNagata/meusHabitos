<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Habitos - Comece a sua jornada</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-card">
    <h1>Meus Habitos</h1>
    <p>Registe-se para começar o seu diário.</p>

    <form id="formRegisto">
        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Como quer ser chamado?" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="O seu melhor e-mail" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha segura" required>
        </div>

        <button type="submit" class="btn-submit">Criar Conta</button>
    </form>

    <div id="mensagem"></div>
</div>

<script src="js/login.js"></script>
</body>
</html>
