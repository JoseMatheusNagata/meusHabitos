<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeelWrite - O seu Diário</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<nav class="navbar">
    <h2 id="saudacao">Olá!</h2>
    <button id="btnSair" class="btn-outline">Sair</button>
</nav>

<div class="container">

    <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; margin-bottom: 20px; padding-bottom: 10px;">
            <h3 style="border: none; margin: 0; padding: 0;">Os meus Hábitos</h3>
            <button id="btnNovoHabito" class="btn-outline">+ Novo Hábito</button>
        </div>

        <form id="formNovoHabito" class="form-novo-habito" style="display: none;">
            <input type="text" id="nomeHabito" placeholder="Nome do hábito (ex: Ler 10 páginas)" required>
            <input type="text" id="descHabito" placeholder="Descrição curta (opcional)">
            <select id="categoriaHabito" required>
                <option value="" disabled selected>Selecione uma categoria...</option>
            </select>
            <button type="submit" class="btn-primary" style="width: 100%;">Salvar Hábito</button>
        </form>

        <div id="listaHabitos" class="habit-list">
            <p class="loading">Carregando hábitos...</p>
        </div>
    </section>

    <section class="card">
        <h3>Reflexão do Dia</h3>
        <div id="areaReflexao">
            <p id="perguntaTexto" class="pergunta-destaque">A carregar pergunta...</p>

            <form id="formReflexao">
                <textarea id="respostaTexto" placeholder="Escreva aqui a sua reflexão..." rows="4" required></textarea>
                <button type="submit" class="btn-primary">Guardar Reflexão</button>
            </form>
            <div id="mensagemReflexao"></div>
        </div>
    </section>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
